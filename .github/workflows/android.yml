name: Compila APK Android

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          node-version: 20
          cache: 'npm'

      - name: Installazione Dipendenze Web
        run: npm ci || npm install

      - name: Build dell'applicazione Web
        run: npm run build

      - name: Configurazione Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurazione Android SDK
        uses: android-actions/setup-android@v3

      - name: Sincronizzazione Capacitor
        run: npx cap sync android

      - name: Compilazione APK con Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Caricamento APK come Artefatto del Run
        uses: actions/upload-artifact@v4
        with:
          name: FitoVeneto-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Creazione Release su GitHub ed Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ github.run_number }}"
          echo "Creazione release $TAG_NAME..."
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "FitoVeneto App - Versione $TAG_NAME" \
            --notes "Scarica e installa l'APK sul tuo dispositivo Android per leggere i bollettini fitosanitari della Regione Veneto con caratteri grandi e sintesi vocale." \
            --target "${{ github.ref_name }}"
